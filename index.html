<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BrokerOS CRM</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#0f172a">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="BrokerOS">
<link rel="apple-touch-icon" href="icon-192.png">
<link rel="icon" type="image/png" href="icon-192.png">
<!-- OG Tags -->
<meta property="og:title" content="BrokerOS CRM">
<meta property="og:description" content="CRM система для брокеров">
<meta property="og:image" content="og-image.jpg">
<meta property="og:type" content="website">
<meta name="twitter:card" content="summary_large_image">
<meta name="twitter:title" content="BrokerOS CRM">
<meta name="twitter:image" content="og-image.jpg">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #06080F;
  --bg2: #0C1018;
  --bg3: #131720;
  --bg4: #1A1F2E;
  --border: rgba(255,255,255,0.06);
  --border2: rgba(255,255,255,0.1);
  --blue: #2563EB;
  --blue2: #3B82F6;
  --blue3: #60A5FA;
  --cyan: #06B6D4;
  --green: #10B981;
  --green2: #34D399;
  --gold: #F59E0B;
  --red: #EF4444;
  --purple: #8B5CF6;
  --text: #F1F5F9;
  --text2: #94A3B8;
  --text3: #64748B;
  --r: 14px;
  --r-sm: 10px;
  --r-lg: 20px;
}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden}

/* ── LOGIN ── */
.login-wrap{min-height:100vh;display:flex;align-items:center;justify-content:center;position:relative;overflow:hidden}
.login-bg{position:absolute;inset:0;background:radial-gradient(ellipse 80% 60% at 10% 50%,rgba(37,99,235,0.12) 0,transparent 70%),radial-gradient(ellipse 60% 80% at 90% 20%,rgba(6,182,212,0.07) 0,transparent 60%),radial-gradient(ellipse 50% 50% at 50% 100%,rgba(16,185,129,0.05) 0,transparent 70%)}
.login-grid{position:absolute;inset:0;background-image:linear-gradient(rgba(255,255,255,0.015) 1px,transparent 1px),linear-gradient(90deg,rgba(255,255,255,0.015) 1px,transparent 1px);background-size:60px 60px}
.login-glow{position:absolute;width:600px;height:600px;border-radius:50%;background:rgba(37,99,235,0.06);filter:blur(80px);top:50%;left:50%;transform:translate(-50%,-50%)}
.login-card{position:relative;z-index:1;width:100%;max-width:420px;margin:20px;background:var(--bg2);border:1px solid var(--border2);border-radius:24px;padding:44px;box-shadow:0 30px 80px rgba(0,0,0,0.6),inset 0 1px 0 rgba(255,255,255,0.05)}
.brand{display:flex;align-items:center;gap:14px;margin-bottom:6px}
.brand-icon{width:48px;height:48px;background:linear-gradient(135deg,var(--blue),var(--cyan));border-radius:13px;display:flex;align-items:center;justify-content:center;font-family:'Syne',sans-serif;font-weight:800;font-size:20px;color:#fff;letter-spacing:-1px;box-shadow:0 8px 24px rgba(37,99,235,0.4)}
.brand-name{font-family:'Syne',sans-serif;font-weight:800;font-size:26px;letter-spacing:-0.5px;background:linear-gradient(135deg,var(--blue3),var(--cyan));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.brand-tag{font-size:12px;color:var(--text3);margin-bottom:36px;padding-left:62px;letter-spacing:0.3px}
.login-h{font-family:'Syne',sans-serif;font-size:22px;font-weight:700;margin-bottom:6px}
.login-sub{font-size:14px;color:var(--text2);margin-bottom:28px}
.fl{margin-bottom:18px}
.fl label{display:block;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:0.8px;color:var(--text3);margin-bottom:8px}
.fi{width:100%;background:var(--bg3);border:1px solid var(--border);border-radius:var(--r-sm);padding:13px 16px;font-family:'DM Sans',sans-serif;font-size:15px;color:var(--text);outline:none;transition:border-color 0.2s,box-shadow 0.2s}
.fi:focus{border-color:var(--blue2);box-shadow:0 0 0 3px rgba(37,99,235,0.15)}
.fi::placeholder{color:var(--text3)}
.fi-select{appearance:none;cursor:pointer}
.fi-ta{resize:vertical;min-height:90px;line-height:1.6}
.err{background:rgba(239,68,68,0.08);border:1px solid rgba(239,68,68,0.2);border-radius:var(--r-sm);padding:12px 16px;font-size:13px;color:#F87171;margin-bottom:18px;display:none}
.btn-login{width:100%;background:linear-gradient(135deg,var(--blue),var(--blue2));color:#fff;border:none;border-radius:var(--r-sm);padding:15px;font-family:'DM Sans',sans-serif;font-size:15px;font-weight:700;cursor:pointer;transition:all 0.2s;margin-top:8px;box-shadow:0 6px 20px rgba(37,99,235,0.35)}
.btn-login:hover{transform:translateY(-1px);box-shadow:0 10px 28px rgba(37,99,235,0.4)}
.btn-login:active{transform:none}
.login-footer{margin-top:24px;text-align:center;font-size:12px;color:var(--text3)}

/* ── LAYOUT ── */
.app{display:none;min-height:100vh}
.sidebar{position:fixed;left:0;top:0;bottom:0;width:240px;background:var(--bg2);border-right:1px solid var(--border);display:flex;flex-direction:column;z-index:200;transition:transform 0.3s}
.sb-top{padding:20px 16px;border-bottom:1px solid var(--border)}
.sb-brand{display:flex;align-items:center;gap:11px;margin-bottom:14px}
.sb-brand-icon{width:36px;height:36px;background:linear-gradient(135deg,var(--blue),var(--cyan));border-radius:10px;display:flex;align-items:center;justify-content:center;font-family:'Syne',sans-serif;font-weight:800;font-size:15px;color:#fff;letter-spacing:-0.5px}
.sb-brand-name{font-family:'Syne',sans-serif;font-weight:800;font-size:18px;background:linear-gradient(135deg,var(--blue3),var(--cyan));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.sb-user{display:flex;align-items:center;gap:10px;padding:10px 12px;background:var(--bg3);border-radius:var(--r-sm);border:1px solid var(--border)}
.sb-avatar{width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;flex-shrink:0}
.sb-user-info{}
.sb-uname{font-size:13px;font-weight:600;line-height:1}
.sb-urole{font-size:11px;color:var(--text3);margin-top:2px}
.sb-nav{flex:1;padding:12px 8px;overflow-y:auto}
.nav-sec{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:1px;color:var(--text3);padding:8px 8px 4px;margin-top:8px}
.nav-item{display:flex;align-items:center;gap:11px;padding:11px 10px;border-radius:var(--r-sm);cursor:pointer;font-size:13px;font-weight:500;color:var(--text2);transition:all 0.15s;margin-bottom:2px;position:relative}
.nav-item:hover{background:rgba(255,255,255,0.04);color:var(--text)}
.nav-item.active{background:rgba(37,99,235,0.12);color:var(--blue3)}
.nav-item.active::before{content:'';position:absolute;left:-8px;top:50%;transform:translateY(-50%);width:3px;height:20px;background:var(--blue2);border-radius:2px}
.nav-item svg{width:16px;height:16px;flex-shrink:0;opacity:0.8}
.nav-badge{margin-left:auto;background:var(--blue);color:#fff;border-radius:20px;padding:2px 7px;font-size:11px;font-weight:700}
.sb-foot{padding:12px 8px;border-top:1px solid var(--border)}
.logout-btn{display:flex;align-items:center;gap:10px;padding:10px;border-radius:var(--r-sm);cursor:pointer;font-size:13px;color:var(--text3);transition:all 0.15s;width:100%;background:none;border:none;font-family:'DM Sans',sans-serif}
.logout-btn:hover{color:#F87171;background:rgba(239,68,68,0.07)}

/* ── MAIN ── */
.main{margin-left:240px;min-height:100vh;background:var(--bg)}
.topbar{position:sticky;top:0;background:rgba(6,8,15,0.85);backdrop-filter:blur(20px);border-bottom:1px solid var(--border);padding:14px 28px;display:flex;align-items:center;justify-content:space-between;z-index:100}
.tb-left{display:flex;align-items:center;gap:14px}
.tb-title{font-family:'Syne',sans-serif;font-size:17px;font-weight:700}
.tb-sub{font-size:12px;color:var(--text3);margin-top:1px}
.mb-btn{display:none;background:var(--bg3);border:1px solid var(--border);border-radius:8px;width:36px;height:36px;align-items:center;justify-content:center;cursor:pointer;color:var(--text);flex-shrink:0}
.tb-right{display:flex;align-items:center;gap:10px}
.tb-user{text-align:right}
.tb-uname{font-size:13px;font-weight:600}
.tb-urole{font-size:11px;color:var(--text3);margin-top:1px}
.content{padding:28px}

/* ── STATS ── */
.stats-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:16px;margin-bottom:28px}
.stat{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);padding:22px;position:relative;overflow:hidden;transition:border-color 0.2s}
.stat:hover{border-color:var(--border2)}
.stat::after{content:'';position:absolute;top:0;left:0;right:0;height:2px;border-radius:2px 2px 0 0}
.stat.blue::after{background:linear-gradient(90deg,var(--blue),var(--cyan))}
.stat.green::after{background:linear-gradient(90deg,var(--green),var(--green2))}
.stat.gold::after{background:linear-gradient(90deg,var(--gold),#FCD34D)}
.stat.purple::after{background:linear-gradient(90deg,var(--purple),#A78BFA)}
.stat-ico{width:40px;height:40px;border-radius:10px;display:flex;align-items:center;justify-content:center;margin-bottom:14px}
.stat-ico.blue{background:rgba(37,99,235,0.12)}
.stat-ico.green{background:rgba(16,185,129,0.12)}
.stat-ico.gold{background:rgba(245,158,11,0.12)}
.stat-ico.purple{background:rgba(139,92,246,0.12)}
.stat-val{font-family:'Syne',sans-serif;font-size:26px;font-weight:800;margin-bottom:4px;letter-spacing:-0.5px}
.stat-lbl{font-size:12px;color:var(--text3)}

/* ── SECTION ── */
.sec-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px}
.sec-title{font-family:'Syne',sans-serif;font-size:15px;font-weight:700}

/* ── TABLE ── */
.tbl-wrap{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);overflow:hidden}
.tbl{width:100%;border-collapse:collapse}
.tbl th{background:var(--bg3);padding:12px 18px;text-align:left;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:0.6px;color:var(--text3);border-bottom:1px solid var(--border)}
.tbl td{padding:14px 18px;font-size:13px;border-bottom:1px solid rgba(255,255,255,0.03);vertical-align:middle}
.tbl tr:last-child td{border:none}
.tbl tr:hover td{background:rgba(255,255,255,0.02);cursor:pointer}

/* ── STATUS ── */
.s{display:inline-flex;align-items:center;gap:5px;padding:3px 10px;border-radius:20px;font-size:11px;font-weight:700;letter-spacing:0.2px}
.s::before{content:'';width:5px;height:5px;border-radius:50%;flex-shrink:0}
.s-new{background:rgba(37,99,235,0.12);color:var(--blue3)}.s-new::before{background:var(--blue3)}
.s-proc{background:rgba(245,158,11,0.12);color:#FCD34D}.s-proc::before{background:#FCD34D}
.s-wait{background:rgba(139,92,246,0.12);color:#A78BFA}.s-wait::before{background:#A78BFA}
.s-ok{background:rgba(16,185,129,0.12);color:var(--green2)}.s-ok::before{background:var(--green2)}
.s-no{background:rgba(239,68,68,0.1);color:#F87171}.s-no::before{background:#F87171}

/* ── ROLE BADGE ── */
.rb{display:inline-block;padding:2px 8px;border-radius:20px;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:0.5px}
.rb-broker{background:rgba(37,99,235,0.12);color:var(--blue3)}
.rb-banker{background:rgba(245,158,11,0.12);color:#FCD34D}
.rb-admin{background:rgba(16,185,129,0.12);color:var(--green2)}

/* ── BUTTONS ── */
.btn{display:inline-flex;align-items:center;gap:7px;padding:9px 18px;border-radius:var(--r-sm);font-family:'DM Sans',sans-serif;font-size:13px;font-weight:700;cursor:pointer;border:none;transition:all 0.2s}
.btn-p{background:linear-gradient(135deg,var(--blue),var(--blue2));color:#fff;box-shadow:0 4px 14px rgba(37,99,235,0.3)}.btn-p:hover{opacity:0.9;transform:translateY(-1px)}
.btn-g{background:var(--bg3);color:var(--text);border:1px solid var(--border)}.btn-g:hover{background:var(--bg4)}
.btn-ok{background:rgba(16,185,129,0.1);color:var(--green2);border:1px solid rgba(16,185,129,0.25)}.btn-ok:hover{background:rgba(16,185,129,0.18)}
.btn-no{background:rgba(239,68,68,0.08);color:#F87171;border:1px solid rgba(239,68,68,0.2)}.btn-no:hover{background:rgba(239,68,68,0.15)}

/* ── MODAL ── */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,0.75);backdrop-filter:blur(12px);z-index:1000;display:none;align-items:center;justify-content:center;padding:20px}
.overlay.show{display:flex}
.modal{background:var(--bg2);border:1px solid var(--border2);border-radius:22px;width:100%;max-width:700px;max-height:90vh;overflow-y:auto;box-shadow:0 40px 100px rgba(0,0,0,0.7)}
.modal.wide{max-width:820px}
.mh{padding:26px 30px 18px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
.mt{font-family:'Syne',sans-serif;font-size:17px;font-weight:700}
.mc-btn{width:32px;height:32px;border-radius:8px;background:var(--bg3);border:none;color:var(--text2);cursor:pointer;font-size:16px;display:flex;align-items:center;justify-content:center;transition:all 0.2s}.mc-btn:hover{background:rgba(239,68,68,0.1);color:#F87171}
.mb{padding:22px 30px}
.mf{padding:16px 30px 26px;display:flex;gap:10px;justify-content:flex-end;border-top:1px solid var(--border)}

/* ── FORM ── */
.fg{display:grid;grid-template-columns:1fr 1fr;gap:18px}

/* ── DETAIL ── */
.di-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:18px}
.di{background:var(--bg3);border-radius:var(--r-sm);padding:13px 16px;border:1px solid var(--border)}
.di-lbl{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:0.6px;color:var(--text3);margin-bottom:4px}
.di-val{font-size:14px;font-weight:600}

/* ── PIPELINE ── */
.pipe{display:flex;gap:3px;margin-bottom:20px;background:var(--bg3);border-radius:var(--r-sm);padding:4px;overflow-x:auto}
.ps{flex:1;min-width:100px;padding:9px 12px;text-align:center;border-radius:8px;font-size:11px;font-weight:600;color:var(--text3);cursor:pointer;transition:all 0.2s;white-space:nowrap}
.ps:hover{background:rgba(255,255,255,0.05);color:var(--text2)}
.ps.active{background:var(--blue);color:#fff;box-shadow:0 4px 12px rgba(37,99,235,0.4)}
.ps.done{color:var(--green2)}

/* ── CHIP ── */
.chip{padding:6px 13px;border-radius:20px;font-size:11px;font-weight:600;cursor:pointer;border:1px solid var(--border);background:var(--bg3);color:var(--text2);transition:all 0.15s}
.chip:hover{border-color:var(--blue2);color:var(--blue3)}
.chip.on{background:rgba(37,99,235,0.12);border-color:var(--blue);color:var(--blue3)}
.chips{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:18px}

/* ── CHAT ── */
.chat{background:var(--bg3);border:1px solid var(--border);border-radius:var(--r);overflow:hidden}
.chat-top{padding:13px 18px;background:var(--bg2);border-bottom:1px solid var(--border);display:flex;align-items:center;gap:8px;font-size:13px;font-weight:600}
.chat-dot{width:7px;height:7px;background:var(--green);border-radius:50%}
.chat-msgs{height:280px;overflow-y:auto;padding:16px;display:flex;flex-direction:column;gap:10px}
.msg{display:flex;gap:9px;max-width:78%}
.msg.own{align-self:flex-end;flex-direction:row-reverse}
.m-av{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;flex-shrink:0}
.m-bubble{background:var(--bg2);border:1px solid var(--border);border-radius:14px;padding:10px 14px;font-size:13px;line-height:1.5}
.msg.own .m-bubble{background:rgba(37,99,235,0.15);border-color:rgba(37,99,235,0.3)}
.m-time{font-size:10px;color:var(--text3);margin-top:4px}
.chat-inp-wrap{padding:13px 16px;background:var(--bg2);border-top:1px solid var(--border);display:flex;gap:10px}
.chat-inp{flex:1;background:var(--bg3);border:1px solid var(--border);border-radius:10px;padding:10px 14px;font-family:'DM Sans',sans-serif;font-size:13px;color:var(--text);outline:none}
.chat-inp:focus{border-color:var(--blue2)}
.chat-snd{width:40px;height:40px;background:linear-gradient(135deg,var(--blue),var(--blue2));border:none;border-radius:10px;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:opacity 0.2s}.chat-snd:hover{opacity:0.9}

/* ── EMPTY ── */
.empty{text-align:center;padding:50px 20px;color:var(--text2)}
.empty-ico{font-size:44px;margin-bottom:14px;opacity:0.4}
.empty-t{font-family:'Syne',sans-serif;font-size:17px;font-weight:700;color:var(--text);margin-bottom:6px}
.empty-s{font-size:13px;margin-bottom:22px}

/* ── AVATAR ── */
.av{width:34px;height:34px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;flex-shrink:0}
.av-b{background:rgba(37,99,235,0.18);color:var(--blue3)}
.av-g{background:rgba(245,158,11,0.18);color:#FCD34D}
.av-gr{background:rgba(16,185,129,0.18);color:var(--green2)}
.ucell{display:flex;align-items:center;gap:11px}
.uname{font-size:13px;font-weight:600}
.uemail{font-size:11px;color:var(--text3)}

/* ── COMMISSION ── */
.comm-hero{background:linear-gradient(135deg,rgba(37,99,235,0.08),rgba(6,182,212,0.05));border:1px solid rgba(37,99,235,0.15);border-radius:var(--r);padding:26px;display:flex;align-items:center;justify-content:space-between;margin-bottom:24px;position:relative;overflow:hidden}
.comm-hero::before{content:'';position:absolute;top:-40px;right:-40px;width:200px;height:200px;background:radial-gradient(circle,rgba(37,99,235,0.1),transparent 70%);border-radius:50%}
.comm-amt{font-family:'Syne',sans-serif;font-size:36px;font-weight:800;letter-spacing:-1px;background:linear-gradient(135deg,var(--blue3),var(--cyan));-webkit-background-clip:text;-webkit-text-fill-color:transparent}

/* ── LOADING ── */
.loading{display:flex;align-items:center;justify-content:center;padding:40px;color:var(--text3);font-size:13px;gap:10px}
.spin{width:18px;height:18px;border:2px solid var(--border);border-top-color:var(--blue2);border-radius:50%;animation:spin 0.7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

/* ── TOAST ── */
.toast{position:fixed;bottom:20px;right:20px;background:var(--bg2);border:1px solid var(--border2);border-radius:12px;padding:14px 18px;font-size:13px;font-weight:500;z-index:9999;transform:translateY(80px);opacity:0;transition:all 0.3s;max-width:300px;box-shadow:0 10px 40px rgba(0,0,0,0.5)}
.toast.show{transform:translateY(0);opacity:1}
.toast.ok{border-left:3px solid var(--green)}
.toast.err{border-left:3px solid var(--red)}

/* ── DIVIDER ── */
.div{height:1px;background:var(--border);margin:18px 0}

/* ── RESPONSIVE ── */
@media(max-width:1024px){.stats-grid{grid-template-columns:repeat(2,1fr)}}
@media(max-width:768px){
  .sidebar{transform:translateX(-100%)}
  .sidebar.open{transform:none}
  .main{margin-left:0}
  .content{padding:16px}
  .fg{grid-template-columns:1fr}
  .di-grid{grid-template-columns:1fr}
  .mb-btn{display:flex}
  .topbar{padding:12px 16px}
  .stats-grid{grid-template-columns:1fr 1fr}
}
@media(max-width:480px){.stats-grid{grid-template-columns:1fr}}
</style>
</head>
<body>

<div class="toast" id="toast"></div>

<!-- ═══ LOGIN ═══ -->
<div class="login-wrap" id="loginPage">
  <div class="login-bg"></div>
  <div class="login-grid"></div>
  <div class="login-glow"></div>

function toast(msg, t='ok'){
  const el = $('toast');
  el.textContent = msg;
  el.className = `toast ${t} show`;
  setTimeout(()=>el.classList.remove('show'), 3200);

// ── AUTH ──
async function login(){
  const email = $('lEmail').value.trim();
  const pass = $('lPass').value;
  const err = $('loginErr');
  const btn = $('lBtn');
  if(!email||!pass){err.textContent='Заполните все поля';err.style.display='block';return}
  btn.textContent='Вход...';btn.disabled=true;err.style.display='none';
  const {data,error} = await db.auth.signInWithPassword({email,password:pass});
  if(error){err.textContent='Неверный email или пароль';err.style.display='block';btn.textContent='Войти в BROKEROS';btn.disabled=false;return}
  await loadUser(data.user);
}

async function logout(){
  if(RT) db.removeChannel(RT);
  await db.auth.signOut();
  $('app').style.display='none';
  $('loginPage').style.display='flex';
  $('lEmail').value='';$('lPass').value='';
  $('lBtn').textContent='Войти в BROKEROS';$('lBtn').disabled=false;
  ME=null;PROF=null;
}

async function loadUser(user){
  ME = user;
  const {data:p} = await db.from('profiles').select('*').eq('id',user.id).single();
  if(!p){toast('Профиль не найден','err');await db.auth.signOut();return}
  PROF = p;
  $('loginPage').style.display='none';
  $('app').style.display='block';
  const av = avCls[p.role]||'av-b';
  $('sbAv').className=`sb-avatar av ${av}`;
  $('sbAv').textContent=ini(p.full_name);
  $('sbName').textContent=p.full_name||user.email;
  $('sbRole').innerHTML=`<span class="rb ${rCls[p.role]||''}">${rLabels[p.role]||p.role}</span>`;
  $('tbUser').textContent=p.full_name||user.email;
  $('tbRole').textContent=rLabels[p.role]||p.role;
  buildSidebar();
  goTo('dashboard');
  setupRT();
}

// ── NAVIGATION ──
async function goTo(page){
  PAGE=page;
  $('sidebar').classList.remove('open');
  document.querySelectorAll('.nav-item').forEach(el=>el.classList.remove('active'));
  const titles={dashboard:['Дашборд','Обзор вашей работы'],apps:['Заявки','Управление заявками клиентов'],users:['Пользователи','Управление доступом'],comm:['Комиссии','Финансовый учёт сделок']};
  const [t,s]=titles[page]||['',''];
  $('tbTitle').textContent=t;$('tbSub').textContent=s;
  $('mainContent').innerHTML='<div class="loading"><div class="spin"></div>Загрузка...</div>';
  if(page==='dashboard') await renderDash();
  else if(page==='apps') await renderApps();
  else if(page==='users') await renderUsers();
  else if(page==='comm') await renderComm();
}

      <div class="di"><div class="di-lbl">Телефон</div><div class="di-val">${a.client_phone}</div></div>
      <div class="di"><div class="di-lbl">Банк</div><div class="di-val">${a.bank}</div></div>
      <div class="di"><div class="di-lbl">Вид кредитования</div><div class="di-val">${a.app_type}</div></div>
      <div class="di"><div class="di-lbl">Сумма</div><div class="di-val" style="color:var(--blue3)">${fmtN(a.amount)}</div></div>
      ${a.profiles?`<div class="di"><div class="di-lbl">Брокер</div><div class="di-val">${a.profiles.full_name}</div></div>`:''}
      <div class="di"><div class="di-lbl">Статус</div><div class="di-val"><span class="s ${sCls[a.status]||'s-new'}">${sLabels[a.status]||a.status}</span></div></div>

    <div style="font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:0.8px;color:var(--text3);margin-bottom:10px">Изменить статус</div>

    <div class="div"></div>
    <div style="font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:0.8px;color:var(--text3);margin-bottom:12px">Переписка</div>
    <div class="chat">
      <div class="chat-top"><div class="chat-dot"></div>Чат по заявке · ${a.bank}</div>
      <div class="chat-msgs" id="chatMsgs">
        ${msgs.length===0?'<div style="text-align:center;color:var(--text3);font-size:12px;margin:auto">Начните переписку</div>':''}

          const own=m.user_id===ME.id;
          const avc=m.profiles?.role==='broker'?'av-b':m.profiles?.role==='bank_manager'?'av-g':'av-gr';
          return `<div class="msg ${own?'own':''}">
            <div class="m-av ${avc}">${ini(m.profiles?.full_name||'U')}</div>
            <div><div class="m-bubble">${m.content}</div>
            <div class="m-time">${m.profiles?.full_name||'User'} · ${fmtD(m.created_at)}</div></div>
          </div>`;
        }).join('')}
      </div>
      <div class="chat-inp-wrap">
        <input class="chat-inp" id="chatIn" placeholder="Написать сообщение..." onkeydown="if(event.key==='Enter')sendMsg('${id}')">
        <button class="chat-snd" onclick="sendMsg('${id}')">
          <svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" width="16" height="16"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
        </button>
      </div>
    </div>`;

  const cm=$('chatMsgs');
  if(cm) cm.scrollTop=cm.scrollHeight;

  if(RT) db.removeChannel(RT);
  RT=db.channel(`app-${id}`)
    .on('postgres_changes',{event:'INSERT',schema:'public',table:'messages',filter:`application_id=eq.${id}`},async(p)=>{
      const {data:m}=await db.from('messages').select('*,profiles(full_name,role)').eq('id',p.new.id).single();
      if(m) addMsg(m);
    }).subscribe();
}

function addMsg(m){
  const c=$('chatMsgs');
  if(!c) return;
  const own=m.user_id===ME.id;
  const avc=m.profiles?.role==='broker'?'av-b':m.profiles?.role==='bank_manager'?'av-g':'av-gr';
  const d=document.createElement('div');
  d.className=`msg ${own?'own':''}`;
  d.innerHTML=`<div class="m-av ${avc}">${ini(m.profiles?.full_name||'U')}</div><div><div class="m-bubble">${m.content}</div><div class="m-time">${m.profiles?.full_name||'User'} · ${fmtD(m.created_at)}</div></div>`;
  const empty=c.querySelector('[style*="text-align:center"]');
  if(empty) empty.remove();
  c.appendChild(d);
  c.scrollTop=c.scrollHeight;
}

async function sendMsg(id){
  const inp=$('chatIn');
  const txt=inp.value.trim();
  if(!txt) return;
  inp.value='';
  const {error}=await db.from('messages').insert({application_id:id,user_id:ME.id,content:txt});
  if(error) toast('Ошибка отправки','err');
}

async function chgSt(id,status,el){
  const {error}=await db.from('applications').update({status}).eq('id',id);
  if(error){toast('Ошибка','err');return}
  document.querySelectorAll('.chip').forEach(c=>c.classList.remove('on'));
  el.classList.add('on');
  // update pipeline
  document.querySelectorAll('.ps').forEach((p,i)=>{
    const s=sKeys[i];
    p.className=`ps ${s===status?'active':sKeys.indexOf(s)<sKeys.indexOf(status)?'done':''}`;
  });
  toast(`Статус: ${sLabels[status]}`);
}

  const iin=$('fIin').value.trim();

  const type=$('fType').value;
  const amt=parseFloat($('fAmt').value);
  const note=$('fNote').value.trim();
  if(!name||!iin||!phone||!bank||!type||!amt){toast('Заполните все поля','err');return}
  if(iin.length!==12){toast('ИИН — 12 цифр','err');return}
  const {error}=await db.from('applications').insert({broker_id:ME.id,client_name:name,client_iin:iin,client_phone:phone,bank,app_type:type,amount:amt,note,status:'new'});
  if(error){toast('Ошибка создания','err');return}
  ['fName','fIin','fPhone','fNote','fAmt'].forEach(i=>$(i).value='');
  $('fBank').value='';$('fType').value='';
  closeM('mNewApp');
  toast('✅ Заявка создана!');
  if(PAGE==='apps') await renderApps();
  else if(PAGE==='dashboard') await renderDash();
}

// ── USERS ──
async function renderUsers(){
  const {data:list=[]}=await db.from('profiles').select('*').order('created_at',{ascending:false});
  $('mainContent').innerHTML=`
    <div class="sec-head"><div class="sec-title">Пользователи системы <span style="color:var(--text3);font-size:13px;font-weight:400">(${list.length})</span></div></div>
    <div class="tbl-wrap">
      <table class="tbl">
        <thead><tr><th>Пользователь</th><th>Роль</th><th>Компания</th><th>Дата</th></tr></thead>
        <tbody>${list.map(u=>{
          const avc=avCls[u.role]||'av-b';
          return `<tr>
            <td><div class="ucell"><div class="av ${avc}">${ini(u.full_name)}</div><div><div class="uname">${u.full_name||'—'}</div><div class="uemail">${u.email||'—'}</div></div></div></td>
            <td><span class="rb ${rCls[u.role]||''}">${rLabels[u.role]||u.role}</span></td>
            <td style="font-size:13px">${u.company||'—'}</td>
            <td style="font-size:12px;color:var(--text3)">${fmtD(u.created_at)}</td>
          </tr>`;
        }).join('')}</tbody>
      </table>
    </div>`;
}

// ── COMMISSIONS ──
async function renderComm(){
  const r=PROF.role;
  let q=db.from('applications').select(r==='broker'?'*':'*,profiles!broker_id(full_name)').in('status',['approved','issued']);
  if(r==='broker') q=q.eq('broker_id',ME.id);
  const {data:list=[]}=await q;
  const amt=list.reduce((s,a)=>s+(a.amount||0),0);
  const comm=r==='broker'?amt*0.02:amt*0.01;
  $('mainContent').innerHTML=`
    <div class="comm-hero">
      <div>
        <div style="font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:0.8px;color:var(--text3);margin-bottom:8px">${r==='broker'?'Ваши комиссии (2% от суммы)':'Доход платформы (1% от суммы)'}</div>
        <div class="comm-amt">${fmtN(comm)}</div>
        <div style="font-size:13px;color:var(--text3);margin-top:6px">По ${list.length} одобренным сделкам</div>
      </div>
      <div style="text-align:right">
        <div style="font-size:11px;color:var(--text3);margin-bottom:6px">Общая сумма сделок</div>
        <div style="font-family:'Syne',sans-serif;font-size:22px;font-weight:800">${fmtN(amt)}</div>
      </div>
    </div>
    <div class="tbl-wrap">
      ${list.length===0?`<div class="empty"><div class="empty-ico">💰</div><div class="empty-t">Одобренных сделок нет</div><div class="empty-s">Комиссии появятся после первых одобрений</div></div>`:`
      <table class="tbl">
        <thead><tr><th>Клиент</th><th>Банк</th><th>Сумма кредита</th><th>Комиссия</th>${r==='admin'?'<th>Брокер</th>':''}<th>Статус</th></tr></thead>
        <tbody>${list.map(a=>`<tr onclick="openDetail('${a.id}')">
          <td><strong>${a.client_name}</strong></td>
          <td>${a.bank}</td>
          <td style="font-weight:600">${fmtN(a.amount)}</td>
          <td style="color:var(--green2);font-weight:700">${fmtN(a.amount*(r==='broker'?0.02:0.01))}</td>
          ${r==='admin'?`<td style="font-size:12px">${a.profiles?.full_name||'—'}</td>`:''}
          <td><span class="s ${sCls[a.status]||'s-ok'}">${sLabels[a.status]||a.status}</span></td>
        </tr>`).join('')}</tbody>
      </table>`}
    </div>`;
}

// ── REALTIME ──
function setupRT(){
  if(PROF.role==='bank_manager'||PROF.role==='admin'){
    db.channel('global-new').on('postgres_changes',{event:'INSERT',schema:'public',table:'applications'},p=>{
      toast(`🔔 Новая заявка: ${p.new.client_name}`);
      if($('nb')){$('nb').textContent=parseInt($('nb').textContent||0)+1}
    }).subscribe();
  }
}

// ── INIT ──
(async()=>{
  const {data:{session}}=await db.auth.getSession();
  if(session?.user) await loadUser(session.user);
})();
</script>
