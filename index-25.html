<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<meta name="theme-color" content="#050d1e">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="BrokerOS">
<meta property="og:title" content="BrokerOS CRM">
<meta property="og:description" content="Fintech CRM для брокеров Казахстана">
<meta property="og:image" content="og-image.jpg">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-192.png">
<link rel="icon" href="icon-192.png">
<title>BrokerOS</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;500;600;700;800;900&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --bg:#050d1e;--bg2:#0a1628;--bg3:#0f1f3a;--bg4:#162847;
  --blue:#1a6dff;--blue2:#1558e0;--blue3:#4d8fff;--blue4:rgba(26,109,255,0.12);
  --cyan:#00c2ff;--green:#00d68f;--red:#ff4757;--yellow:#ffd32a;--purple:#a855f7;
  --text:#f0f4ff;--text2:#7a8fb5;--text3:#3d5175;
  --border:rgba(255,255,255,0.055);--border2:rgba(255,255,255,0.1);
  --r:18px;--r-sm:12px;--r-xs:8px;
  --font:'Nunito',sans-serif;--mono:'JetBrains Mono',monospace;
}
body{background:var(--bg);color:var(--text);font-family:var(--font);min-height:100vh;overflow-x:hidden;-webkit-font-smoothing:antialiased}
input,select,textarea,button{font-family:var(--font);outline:none;border:none;background:none}
button{cursor:pointer}
a{text-decoration:none;color:inherit}
#splash{position:fixed;inset:0;background:var(--bg);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:9999;transition:opacity 0.6s,transform 0.6s}
#splash.hide{opacity:0;pointer-events:none;transform:scale(1.04)}
.splash-logo{width:200px;animation:sIn 0.9s cubic-bezier(0.34,1.56,0.64,1) both}
.splash-line{width:1px;height:60px;background:linear-gradient(to bottom,transparent,var(--blue),transparent);margin-top:40px;animation:sLine 0.7s 0.5s ease both}
.splash-txt{font-size:10px;letter-spacing:5px;color:var(--text3);text-transform:uppercase;margin-top:16px;animation:sUp 0.6s 1s ease both;font-weight:700}
@keyframes sIn{from{opacity:0;transform:scale(0.7) translateY(20px)}to{opacity:1;transform:scale(1) translateY(0)}}
@keyframes sLine{from{opacity:0;height:0}to{opacity:1;height:60px}}
@keyframes sUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
#loginPage{min-height:100vh;display:none;align-items:center;justify-content:center;background:var(--bg);position:relative;overflow:hidden}
#loginPage.show{display:flex}
.lg-glow{position:absolute;width:700px;height:700px;border-radius:50%;background:radial-gradient(circle,rgba(26,109,255,0.1) 0,transparent 70%);top:50%;left:50%;transform:translate(-50%,-50%);pointer-events:none}
.lg-grid{position:absolute;inset:0;background-image:linear-gradient(rgba(26,109,255,0.025) 1px,transparent 1px),linear-gradient(90deg,rgba(26,109,255,0.025) 1px,transparent 1px);background-size:50px 50px;pointer-events:none}
.lc{position:relative;z-index:1;width:100%;max-width:400px;margin:24px;background:var(--bg2);border:1px solid var(--border2);border-radius:28px;padding:44px 36px;box-shadow:0 40px 100px rgba(0,0,0,0.6),inset 0 1px 0 rgba(255,255,255,0.05)}
.lc-logo{display:block;width:180px;margin:0 auto 32px;filter:drop-shadow(0 4px 24px rgba(26,109,255,0.3))}
.lc-div{display:flex;align-items:center;gap:12px;margin-bottom:28px}
.lc-div::before,.lc-div::after{content:'';flex:1;height:1px;background:var(--border)}
.lc-div span{font-size:11px;color:var(--text3);font-weight:700;letter-spacing:1.5px;text-transform:uppercase}
.fi-w{position:relative;margin-bottom:12px}
.fi-ic{position:absolute;left:16px;top:50%;transform:translateY(-50%);color:var(--text3);pointer-events:none}
.fi-ic svg{width:17px;height:17px;display:block}
.fi{width:100%;background:var(--bg3);border:1.5px solid var(--border);border-radius:var(--r-sm);padding:15px 16px 15px 46px;color:var(--text);font-size:15px;font-weight:600;transition:all 0.2s}
.fi:focus{border-color:var(--blue);background:var(--bg4);box-shadow:0 0 0 4px rgba(26,109,255,0.1)}
.fi::placeholder{color:var(--text3);font-weight:500}
.btn-login{width:100%;background:linear-gradient(135deg,var(--blue),var(--blue2));color:#fff;border-radius:var(--r-sm);padding:16px;font-size:16px;font-weight:900;margin-top:8px;transition:all 0.25s;box-shadow:0 8px 30px rgba(26,109,255,0.45),inset 0 1px 0 rgba(255,255,255,0.15);letter-spacing:0.5px}
.btn-login:hover{transform:translateY(-2px);box-shadow:0 14px 40px rgba(26,109,255,0.55)}
.btn-login:disabled{opacity:0.6;transform:none;cursor:not-allowed}
.lg-err{background:rgba(255,71,87,0.1);border:1px solid rgba(255,71,87,0.3);border-radius:var(--r-xs);padding:12px 16px;font-size:13px;color:#ff8a95;display:none;margin-top:12px;font-weight:600}
.lg-foot{text-align:center;font-size:12px;color:var(--text3);margin-top:20px;font-weight:600;letter-spacing:0.5px}
#app{display:none}
.layout{display:flex;min-height:100vh}
.sidebar{width:256px;background:var(--bg2);border-right:1px solid var(--border);display:flex;flex-direction:column;position:fixed;top:0;left:0;height:100vh;z-index:300;transition:transform 0.3s cubic-bezier(0.4,0,0.2,1)}
.sb-hd{padding:22px 20px 16px;border-bottom:1px solid var(--border)}
.sb-logo{width:130px;height:auto;filter:drop-shadow(0 2px 12px rgba(26,109,255,0.25))}
.sb-usr{padding:14px 20px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:12px}
.ava{width:42px;height:42px;border-radius:14px;display:flex;align-items:center;justify-content:center;font-weight:900;font-size:14px;flex-shrink:0;letter-spacing:-0.5px}
.av-admin{background:linear-gradient(135deg,#7c3aed,#a855f7);box-shadow:0 4px 14px rgba(168,85,247,0.4)}
.av-broker{background:linear-gradient(135deg,var(--blue),var(--cyan));box-shadow:0 4px 14px rgba(26,109,255,0.4)}
.av-bank{background:linear-gradient(135deg,#059669,var(--green));box-shadow:0 4px 14px rgba(0,214,143,0.4)}
.sb-nm{font-weight:800;font-size:14px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.sb-rl{font-size:11px;color:var(--text2);margin-top:2px;font-weight:600}
.sb-nav{flex:1;overflow-y:auto;padding:10px 12px;scrollbar-width:none}
.sb-nav::-webkit-scrollbar{display:none}
.nav-sec{font-size:10px;text-transform:uppercase;letter-spacing:1.5px;color:var(--text3);padding:14px 8px 6px;font-weight:700}
.nav-item{display:flex;align-items:center;gap:11px;padding:11px 12px;cursor:pointer;font-size:14px;font-weight:700;color:var(--text2);border-radius:var(--r-sm);transition:all 0.15s;margin-bottom:2px}
.nav-item:hover{color:var(--text);background:rgba(255,255,255,0.04)}
.nav-item.active{color:#fff;background:var(--blue4);box-shadow:inset 2px 0 0 var(--blue)}
.nav-item svg{width:17px;height:17px;flex-shrink:0;opacity:0.7}
.nav-item.active svg{opacity:1}
.nb{background:var(--blue);color:#fff;font-size:11px;font-weight:800;border-radius:20px;padding:2px 8px;margin-left:auto}
.sb-ft{padding:16px 20px;border-top:1px solid var(--border)}
.btn-out{width:100%;background:rgba(255,71,87,0.07);border:1px solid rgba(255,71,87,0.2);border-radius:var(--r-xs);padding:11px;color:var(--red);font-size:13px;font-weight:800;transition:all 0.2s;letter-spacing:0.3px}
.btn-out:hover{background:rgba(255,71,87,0.14);border-color:rgba(255,71,87,0.4)}
.ov{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.65);backdrop-filter:blur(3px);z-index:250}
.topbar{position:sticky;top:0;background:rgba(5,13,30,0.88);backdrop-filter:blur(24px);-webkit-backdrop-filter:blur(24px);border-bottom:1px solid var(--border);padding:0 24px;height:60px;display:flex;align-items:center;justify-content:space-between;z-index:200}
.tb-l{display:flex;align-items:center;gap:14px}
.mb{background:none;border:1px solid var(--border2);border-radius:10px;padding:9px;display:none;color:var(--text2);transition:all 0.2s}
.mb:hover{background:var(--bg3)}
.mb svg{width:18px;height:18px;display:block}
.tb-ttl{font-size:17px;font-weight:900;letter-spacing:-0.3px}
.tb-r{display:flex;align-items:center;gap:10px}
.nb-btn{background:var(--bg3);border:1px solid var(--border);border-radius:10px;padding:9px;position:relative;color:var(--text2);transition:all 0.2s}
.nb-btn:hover{border-color:var(--border2)}
.nb-btn svg{width:17px;height:17px;display:block}
.nb-dot{position:absolute;top:7px;right:7px;width:7px;height:7px;border-radius:50%;background:var(--red);border:2px solid var(--bg);display:none}
.main{margin-left:256px;min-height:100vh;display:flex;flex-direction:column}
.page{padding:24px;display:none;animation:pgIn 0.22s ease both}
.page.active{display:block}
@keyframes pgIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
.stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:14px;margin-bottom:24px}
.stat{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);padding:20px;position:relative;overflow:hidden;transition:transform 0.2s,box-shadow 0.2s}
.stat:hover{transform:translateY(-2px);box-shadow:0 8px 24px rgba(0,0,0,0.3)}
.sg{position:absolute;top:-40px;right:-40px;width:100px;height:100px;border-radius:50%;opacity:0.18;filter:blur(24px)}
.si{width:36px;height:36px;border-radius:10px;display:flex;align-items:center;justify-content:center;margin-bottom:14px}
.si svg{width:17px;height:17px}
.sv{font-size:28px;font-weight:900;letter-spacing:-1px;line-height:1}
.sl{font-size:12px;color:var(--text2);margin-top:6px;font-weight:700}
.s-b .sg,.s-b .si{background:var(--blue)}.s-b .si{background:rgba(26,109,255,0.15);color:var(--blue3)}
.s-g .sg{background:var(--green)}.s-g .si{background:rgba(0,214,143,0.15);color:var(--green)}
.s-y .sg{background:var(--yellow)}.s-y .si{background:rgba(255,211,42,0.15);color:var(--yellow)}
.s-p .sg{background:var(--purple)}.s-p .si{background:rgba(168,85,247,0.15);color:var(--purple)}
.sec-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px}
.sec-ttl{font-size:16px;font-weight:900;letter-spacing:-0.3px}
.sec-sub{font-size:12px;color:var(--text2);font-weight:600;margin-top:2px}
.btn{display:inline-flex;align-items:center;gap:7px;padding:10px 18px;border-radius:var(--r-sm);font-size:13px;font-weight:800;transition:all 0.2s;letter-spacing:0.2px;white-space:nowrap}
.btn svg{width:15px;height:15px;flex-shrink:0}
.btn-b{background:var(--blue);color:#fff;box-shadow:0 4px 16px rgba(26,109,255,0.35)}
.btn-b:hover{background:var(--blue2);box-shadow:0 6px 20px rgba(26,109,255,0.45);transform:translateY(-1px)}
.btn-gh{background:var(--bg3);border:1px solid var(--border2);color:var(--text2)}
.btn-gh:hover{color:var(--text);border-color:var(--blue3)}
.btn-gn{background:rgba(0,214,143,0.1);border:1px solid rgba(0,214,143,0.25);color:var(--green)}
.btn-gn:hover{background:rgba(0,214,143,0.18)}
.btn-sm{padding:8px 14px;font-size:12px}
.badge{display:inline-flex;align-items:center;gap:5px;padding:4px 10px;border-radius:20px;font-size:11px;font-weight:800;white-space:nowrap;letter-spacing:0.2px}
.badge::before{content:'';width:5px;height:5px;border-radius:50%;background:currentColor}
.b-new{background:rgba(122,143,181,0.15);color:var(--text2)}
.b-taken,.b-in_progress{background:rgba(26,109,255,0.15);color:var(--blue3)}
.b-sent{background:rgba(168,85,247,0.15);color:var(--purple)}
.b-offered,.b-approved{background:rgba(0,214,143,0.15);color:var(--green)}
.b-closed,.b-deal{background:rgba(168,85,247,0.2);color:#c084fc}
.b-rejected{background:rgba(255,71,87,0.15);color:var(--red)}
.b-platform{background:rgba(255,211,42,0.15);color:var(--yellow)}
.b-external{background:rgba(26,109,255,0.12);color:var(--blue3)}
.lc{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);padding:18px 20px;cursor:pointer;transition:all 0.2s;position:relative;overflow:hidden;margin-bottom:10px}
.lc::before{content:'';position:absolute;left:0;top:0;bottom:0;width:3px;border-radius:3px 0 0 3px}
.lc.s-new::before{background:var(--text3)}
.lc.s-taken::before,.lc.s-in_progress::before{background:var(--blue)}
.lc.s-sent::before{background:var(--purple)}
.lc.s-offered::before,.lc.s-approved::before{background:var(--green)}
.lc.s-closed::before{background:#a855f7}
.lc.s-rejected::before{background:var(--red)}
.lc:hover{border-color:var(--border2);transform:translateX(2px);box-shadow:0 4px 20px rgba(0,0,0,0.25)}
.lc-top{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:10px}
.lc-nm{font-weight:800;font-size:15px;letter-spacing:-0.3px}
.lc-dt{font-size:12px;color:var(--text2);margin-top:3px;font-weight:600}
.lc-amt{font-weight:900;font-size:17px;font-family:var(--mono);color:var(--blue3);letter-spacing:-0.5px}
.lc-meta{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.lc-act{display:flex;gap:8px;margin-top:12px;flex-wrap:wrap}
.funnel{display:flex;gap:8px;margin-bottom:20px;overflow-x:auto;padding-bottom:4px;scrollbar-width:none}
.funnel::-webkit-scrollbar{display:none}
.fchip{flex-shrink:0;padding:8px 14px;border-radius:20px;background:var(--bg3);border:1px solid var(--border);font-size:12px;font-weight:800;cursor:pointer;transition:all 0.2s;white-space:nowrap;color:var(--text2)}
.fchip:hover{border-color:var(--border2);color:var(--text)}
.fchip.active{background:var(--blue4);border-color:var(--blue);color:#fff}
.modal-wrap{display:none;position:fixed;inset:0;z-index:600;align-items:flex-end;justify-content:center;background:rgba(0,0,0,0.72);backdrop-filter:blur(6px)}
.modal-wrap.open{display:flex;animation:mbg 0.2s ease}
@keyframes mbg{from{opacity:0}to{opacity:1}}
.modal{background:var(--bg2);border-radius:28px 28px 0 0;width:100%;max-width:560px;max-height:92vh;overflow-y:auto;padding:20px 24px 40px;border-top:1px solid var(--border2);animation:msl 0.3s cubic-bezier(0.34,1.1,0.64,1)}
@keyframes msl{from{transform:translateY(60px);opacity:0}to{transform:translateY(0);opacity:1}}
.mh{width:40px;height:4px;border-radius:2px;background:var(--border2);margin:0 auto 20px}
.mt{font-size:19px;font-weight:900;margin-bottom:20px;letter-spacing:-0.4px;display:flex;align-items:center;justify-content:space-between}
.fr{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.fg{display:flex;flex-direction:column;gap:6px}
.fg.full{grid-column:1/-1}
label{font-size:11px;font-weight:800;color:var(--text2);text-transform:uppercase;letter-spacing:0.8px}
.inp{background:var(--bg3);border:1.5px solid var(--border);border-radius:var(--r-sm);padding:13px 15px;color:var(--text);font-size:14px;font-weight:600;width:100%;transition:all 0.2s}
.inp:focus{border-color:var(--blue);background:var(--bg4);box-shadow:0 0 0 4px rgba(26,109,255,0.1)}
.inp::placeholder{color:var(--text3);font-weight:500}
select.inp option{background:var(--bg3)}
textarea.inp{resize:vertical;min-height:76px}
.btn-sub{width:100%;background:linear-gradient(135deg,var(--blue),var(--blue2));color:#fff;border-radius:var(--r-sm);padding:16px;font-size:15px;font-weight:900;margin-top:20px;transition:all 0.2s;box-shadow:0 6px 24px rgba(26,109,255,0.4);letter-spacing:0.3px}
.btn-sub:hover{transform:translateY(-2px);box-shadow:0 10px 32px rgba(26,109,255,0.5)}
.btn-sub:disabled{opacity:0.6;transform:none}
.cx{background:var(--bg3);border:1px solid var(--border);border-radius:50%;width:32px;height:32px;display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--text2);font-size:16px;flex-shrink:0}
.cx:hover{color:var(--text);background:var(--bg4)}
.pw{display:none;position:fixed;inset:0;z-index:500;background:rgba(0,0,0,0.65);backdrop-filter:blur(4px)}
.pw.open{display:flex;align-items:stretch;justify-content:flex-end;animation:pbg 0.2s ease}
@keyframes pbg{from{opacity:0}to{opacity:1}}
.panel{width:100%;max-width:500px;background:var(--bg2);border-left:1px solid var(--border2);overflow-y:auto;animation:psl 0.28s cubic-bezier(0.4,0,0.2,1)}
@keyframes psl{from{transform:translateX(40px);opacity:0}to{transform:translateX(0);opacity:1}}
.ph{padding:18px 24px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;background:var(--bg2);z-index:1}
.pt{font-size:17px;font-weight:900;letter-spacing:-0.3px}
.pb{padding:20px 24px}
.dig{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:18px}
.di{background:var(--bg3);border-radius:var(--r-sm);padding:14px}
.di-l{font-size:10px;font-weight:800;color:var(--text3);text-transform:uppercase;letter-spacing:0.8px;margin-bottom:5px}
.di-v{font-size:14px;font-weight:700}
.di.full{grid-column:1/-1}
.di.mn .di-v{font-family:var(--mono);font-size:16px;color:var(--blue3)}
.oc{background:var(--bg3);border:1px solid var(--border);border-radius:var(--r-sm);padding:16px;margin-bottom:10px;transition:all 0.2s}
.oc.sel{border-color:var(--green);background:rgba(0,214,143,0.05);box-shadow:0 0 0 1px rgba(0,214,143,0.2)}
.ot{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
.ob{font-weight:900;font-size:15px}
.os{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}
.oi{text-align:center}
.oi-l{font-size:10px;color:var(--text3);font-weight:700;text-transform:uppercase;letter-spacing:0.5px;margin-bottom:3px}
.oi-v{font-size:14px;font-weight:900;font-family:var(--mono)}
.dc{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);padding:20px;margin-bottom:12px}
.dt{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:14px}
.dc-nm{font-weight:900;font-size:15px}
.dc-sr{font-size:12px;color:var(--text2);margin-top:3px;font-weight:700}
.cs{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-top:14px}
.ci{background:var(--bg3);border-radius:var(--r-sm);padding:14px;text-align:center}
.ci-l{font-size:10px;color:var(--text2);font-weight:800;text-transform:uppercase;letter-spacing:0.5px;margin-bottom:6px}
.ci-v{font-size:15px;font-weight:900;font-family:var(--mono)}
.ci-v.g{color:var(--green)}.ci-v.b{color:var(--blue3)}
.st-row{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:18px}
.stb{padding:8px 14px;border-radius:20px;font-size:12px;font-weight:800;border:1.5px solid var(--border);color:var(--text2);transition:all 0.2s;background:var(--bg3)}
.stb:hover{border-color:var(--border2);color:var(--text)}
.stb.on{border-color:var(--blue);background:var(--blue4);color:#fff}
.wa{display:inline-flex;align-items:center;gap:7px;padding:8px 14px;border-radius:var(--r-sm);background:rgba(37,211,102,0.1);border:1px solid rgba(37,211,102,0.25);color:#25d366;font-size:13px;font-weight:800;transition:all 0.2s}
.wa:hover{background:rgba(37,211,102,0.18)}
.wa svg{width:15px;height:15px}
.tbl-w{overflow-x:auto;border-radius:var(--r);border:1px solid var(--border)}
table{width:100%;border-collapse:collapse;font-size:14px}
th{text-align:left;padding:11px 16px;font-size:11px;font-weight:800;color:var(--text2);text-transform:uppercase;letter-spacing:0.8px;border-bottom:1px solid var(--border);background:var(--bg3)}
td{padding:13px 16px;border-bottom:1px solid var(--border)}
tr:last-child td{border-bottom:none}
tr:hover td{background:rgba(255,255,255,0.015)}
tr{cursor:pointer}
.empty{text-align:center;padding:60px 20px}
.empty-i{font-size:48px;margin-bottom:12px}
.empty-t{font-size:16px;font-weight:900;margin-bottom:6px;letter-spacing:-0.3px}
.empty-s{font-size:14px;color:var(--text2);font-weight:600}
.toast{position:fixed;bottom:80px;left:50%;transform:translateX(-50%) translateY(12px);background:var(--bg3);border:1px solid var(--border2);border-radius:14px;padding:12px 22px;font-size:14px;font-weight:800;opacity:0;transition:all 0.3s cubic-bezier(0.34,1.3,0.64,1);z-index:1000;pointer-events:none;white-space:nowrap;box-shadow:0 8px 32px rgba(0,0,0,0.4)}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
.toast.ok{border-color:rgba(0,214,143,0.4);color:var(--green)}
.toast.err{border-color:rgba(255,71,87,0.4);color:var(--red)}
.toast.info{border-color:rgba(26,109,255,0.4);color:var(--blue3)}
.uz{border:2px dashed var(--border2);border-radius:var(--r-sm);padding:20px;text-align:center;cursor:pointer;transition:all 0.2s;color:var(--text2);font-size:14px;font-weight:600}
.uz:hover{border-color:var(--blue);color:var(--blue3);background:var(--blue4)}
.uz input{display:none}
.fi-item{display:flex;align-items:center;gap:10px;background:var(--bg3);border-radius:var(--r-xs);padding:10px 12px;margin-top:8px;font-size:13px;font-weight:700}
.cp{background:var(--bg3);border-radius:var(--r-sm);padding:16px;margin:16px 0;display:none}
.cp-split{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}
.cps{background:var(--bg4);border-radius:var(--r-xs);padding:12px;text-align:center}
.cps-l{font-size:10px;color:var(--text2);font-weight:800;text-transform:uppercase;letter-spacing:0.5px;margin-bottom:5px}
.cps-v{font-size:14px;font-weight:900;font-family:var(--mono)}
.cps-v.g{color:var(--green)}.cps-v.b{color:var(--blue3)}
@media(max-width:768px){
  .sidebar{transform:translateX(-100%)}
  .sidebar.open{transform:translateX(0)}
  .ov.open{display:block}
  .main{margin-left:0}
  .mb{display:flex}
  .fr{grid-template-columns:1fr}
  .stats{grid-template-columns:1fr 1fr}
  .dig{grid-template-columns:1fr 1fr}
  .cs,.cp-split{grid-template-columns:1fr}
  .panel{max-width:100%}
  .page{padding:16px}
  .topbar{padding:0 16px}
}
@media(max-width:380px){.stats{grid-template-columns:1fr}.lc-amt{font-size:15px}}
</style>
</head>

async function goTo(page){

  else if(page==='leads') await renderLeads();

    let q=db.from('leads').select('*',{count:'exact',head:true}).eq('status',s);
    if(r==='broker') q=q.eq('assigned_broker',ME.id);

      '<div class="lc-act" onclick="event.stopPropagation()">'+

      '<button class="btn btn-gh btn-sm" onclick="prepApp(''+l.id+'',''+encodeURIComponent(l.client_name||'')+'','+( l.amount||0)+')">В банк →</button></div>':'';

      actBtns+'</div>';
  }).join('');

  const {error}=await db.from('leads').insert({client_name:name,phone:G('lPhone').value.trim(),amount:G('lAmt').value||null,source:G('lSrc').value,city:G('lCity').value.trim(),note:G('lNote').value.trim(),status:'new',assigned_broker:PR.role==='broker'?ME.id:null});

  if(!apps||!apps.length){G('aBody').innerHTML='<div class="empty"><div class="empty-i">📄</div><div class="empty-t">Заявок нет</div></div>';return}
  G('aBody').innerHTML=apps.map(a=>'<div class="lc s-'+(a.status||'in_progress')+'" onclick="openApp(''+a.id+'')">'+
    '<div class="lc-top"><div><div class="lc-nm">'+(a.client_name||'—')+'</div><div class="lc-dt">🏦 '+(a.banks?.name||'—')+' · '+fD(a.created_at)+'</div></div><div class="lc-amt">'+fN(a.amount)+'</div></div>'+
    '<div class="lc-meta"><span class="badge '+(ST[a.status]?.c||'b-in_progress')+'">'+(ST[a.status]?.l||a.status)+'</span>'+(a.iin?'<span style="font-size:11px;color:var(--text3);font-family:var(--mono)">ИИН: '+a.iin+'</span>':'')+
    '</div></div>').join('');
}

async function openApp(id){
  const {data:a}=await db.from('applications').select('*,banks(name),leads(client_name,source,amount)').eq('id',id).single();
  if(!a) return;
  const {data:offers}=await db.from('offers').select('*').eq('application_id',id);
  const {data:files}=await db.from('files').select('*').eq('application_id',id);
  const r=PR.role;
  G('pAT').textContent=a.client_name||'Заявка';
  G('pAB').innerHTML=
    '<div class="dig">'+
      '<div class="di"><div class="di-l">Клиент</div><div class="di-v">'+(a.client_name||'—')+'</div></div>'+
      '<div class="di mn"><div class="di-l">Сумма</div><div class="di-v">'+fN(a.amount)+'</div></div>'+
      '<div class="di"><div class="di-l">Банк</div><div class="di-v">🏦 '+(a.banks?.name||'—')+'</div></div>'+
      '<div class="di"><div class="di-l">Срок</div><div class="di-v">'+(a.term||'—')+' мес</div></div>'+
      (a.iin?'<div class="di"><div class="di-l">ИИН</div><div class="di-v" style="font-family:var(--mono)">'+a.iin+'</div></div>':'')+
      (a.phone?'<div class="di"><div class="di-l">Телефон</div><div class="di-v">'+a.phone+'</div></div>':'')+
      '<div class="di"><div class="di-l">Статус</div><div class="di-v"><span class="badge '+(ST[a.status]?.c||'b-in_progress')+'">'+(ST[a.status]?.l||a.status)+'</span></div></div>'+
    '</div>'+
    (files&&files.length?'<div style="margin-bottom:16px"><div style="font-size:11px;font-weight:800;color:var(--text2);margin-bottom:8px;text-transform:uppercase;letter-spacing:0.8px">Файлы</div>'+files.map(f=>'<div class="fi-item">📎 <a href="'+f.url+'" target="_blank">'+( f.type||'Файл')+'</a></div>').join('')+'</div>':'')+
    '<div style="font-size:14px;font-weight:900;margin-bottom:12px">Предложения банков</div>'+
    ((offers||[]).length?(offers||[]).map(o=>'<div class="oc'+(o.is_selected?' sel':'')+'">'+
      '<div class="ot"><div class="ob">'+(o.is_selected?'✓ Выбрано • ':'')+fN(o.approved_amount)+'</div>'+
      (r==='broker'&&!o.is_selected?'<button class="btn btn-gn btn-sm" onclick="selOffer(''+o.id+'',''+id+'',''+( a.leads?.source||'external')+'','+( a.amount||0)+')">Выбрать</button>':'')+
      '</div><div class="os">'+
        '<div class="oi"><div class="oi-l">Платёж/мес</div><div class="oi-v">'+fN(o.monthly_payment)+'</div></div>'+
        '<div class="oi"><div class="oi-l">Срок</div><div class="oi-v">'+(o.term||'—')+' мес</div></div>'+
        '<div class="oi"><div class="oi-l">Ставка</div><div class="oi-v">'+(o.interest||'—')+'%</div></div>'+
      '</div></div>').join(''):'<div style="text-align:center;padding:24px;color:var(--text3);font-size:14px">Предложений ещё нет</div>')+
    (r==='bank'?'<button class="btn btn-b" style="width:100%;justify-content:center;margin-top:14px" onclick="G('ofAppId').value=''+id+'';closeP('pApp');openM('mOffer')">+ Добавить предложение</button>':'');
  openP('pApp');
}

async function createApp(){
  const name=G('aNm').value.trim(),bankId=G('aBnk').value,amount=G('aAmt').value;
  if(!name||!bankId||!amount){toast('Заполните обязательные поля','err');return}
  const {data:nd,error}=await db.from('applications').insert({lead_id:G('aLead').value||null,client_name:name,iin:G('aIin').value.trim(),phone:G('aPh').value.trim(),amount:amount||null,term:G('aTrm').value,bank_id:bankId,broker_id:ME.id,note:G('aNote').value.trim(),status:'in_progress'}).select().single();
  if(error){toast('Ошибка: '+error.message,'err');return}
  if(G('aLead').value) await db.from('leads').update({status:'sent'}).eq('id',G('aLead').value);
  if(PF.length&&nd){
    for(const file of PF){
      const path='apps/'+nd.id+'/'+file.name;
      const {data:up}=await db.storage.from('files').upload(path,file,{upsert:true});
      if(up){const {data:{publicUrl}}=db.storage.from('files').getPublicUrl(path);await db.from('files').insert({application_id:nd.id,type:file.name,url:publicUrl})}
    }
    PF=[];G('fList').innerHTML='';
  }
  toast('✓ Заявка отправлена');closeM('mApp');
  await renderApps();
}

async function submitOffer(){
  const appId=G('ofAppId').value,amt=G('oAmt').value;
  if(!amt){toast('Введите сумму','err');return}
  const {error}=await db.from('offers').insert({application_id:appId,approved_amount:amt,monthly_payment:G('oPay').value||null,term:G('oTrm').value,interest:G('oRate').value||null,is_selected:false});
  if(error){toast('Ошибка: '+error.message,'err');return}
  await db.from('applications').update({status:'offered'}).eq('id',appId);
  toast('✓ Предложение отправлено');closeM('mOffer');
  await renderApps();
}

async function selOffer(offId,appId,src,amount){
  await db.from('offers').update({is_selected:true}).eq('id',offId);
  G('dAppId').value=appId;G('dSrc').value=src;
  G('dFee').value=Math.round(amount*0.03);
  prevComm();closeP('pApp');openM('mDeal');
}

function prevComm(){
  const fee=parseFloat(G('dFee').value)||0;
  const src=G('dSrc').value;
  if(!fee){G('cpBlock').style.display='none';return}
  const pp=src==='platform'?0.30:0.05;
  G('cpP').textContent=fN(Math.round(fee*pp));
  G('cpB').textContent=fN(Math.round(fee*(1-pp)));
  G('cpT').textContent=fN(fee);
  G('cpBlock').style.display='block';
}

async function closeDeal(){
  const appId=G('dAppId').value,src=G('dSrc').value;
  const fee=parseFloat(G('dFee').value);
  if(!fee){toast('Введите комиссию','err');return}
  const pp=src==='platform'?0.30:0.05;
  const {error}=await db.from('deals').insert({application_id:appId,service_fee:fee,partner_fee:Math.round(fee*pp),broker_fee:Math.round(fee*(1-pp)),commission_type:src,payment_method:G('dMth').value});
  if(error){toast('Ошибка: '+error.message,'err');return}
  await db.from('applications').update({status:'closed'}).eq('id',appId);
  const {data:ap}=await db.from('applications').select('lead_id').eq('id',appId).single();
  if(ap?.lead_id) await db.from('leads').update({status:'closed'}).eq('id',ap.lead_id);
  toast('🎉 Сделка закрыта!','ok');closeM('mDeal');
  await renderApps();
}

async function renderDeals(){
  const r=PR.role;
  let q=db.from('deals').select('*,applications(client_name,amount,leads(source))').order('created_at',{ascending:false});
  if(r==='broker'){
    const {data:ma}=await db.from('applications').select('id').eq('broker_id',ME.id);
    const ids=(ma||[]).map(a=>a.id);
    if(ids.length) q=q.in('application_id',ids);
    else{G('deBody').innerHTML='<div class="empty"><div class="empty-i">💰</div><div class="empty-t">Сделок нет</div></div>';return}
  }
  const {data:dls}=await q;
  if(!dls||!dls.length){G('deBody').innerHTML='<div class="empty"><div class="empty-i">💰</div><div class="empty-t">Сделок нет</div></div>';return}
  const tP=dls.reduce((s,d)=>s+(d.partner_fee||0),0);
  const tB=dls.reduce((s,d)=>s+(d.broker_fee||0),0);
  const svgM='<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="M16 8h-6a2 2 0 000 4h4a2 2 0 010 4H8"/></svg>';
  const svgC='<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="20 6 9 17 4 12"/></svg>';
  G('deStats').innerHTML=
    '<div class="stat s-g"><div class="sg"></div><div class="si">'+svgM+'</div><div class="sv" style="font-size:14px;margin-top:6px">'+fN(r==='broker'?tB:tP)+'</div><div class="sl">'+(r==='broker'?'Моя комиссия':'Доход платформы')+'</div></div>'+
    '<div class="stat s-b"><div class="sg"></div><div class="si">'+svgC+'</div><div class="sv">'+dls.length+'</div><div class="sl">Сделок</div></div>';
  G('deBody').innerHTML=dls.map(d=>'<div class="dc">'+
    '<div class="dt"><div><div class="dc-nm">'+(d.applications?.client_name||'—')+'</div><div class="dc-sr">'+(d.commission_type==='platform'?'🏢 Платформа — 30%':'🔗 Внешний — 5%')+'</div></div><div class="lc-amt">'+fN(d.service_fee)+'</div></div>'+
    '<div class="cs">'+
      '<div class="ci"><div class="ci-l">Платформа</div><div class="ci-v b">'+fN(d.partner_fee)+'</div></div>'+
      '<div class="ci"><div class="ci-l">Брокер</div><div class="ci-v g">'+fN(d.broker_fee)+'</div></div>'+
      '<div class="ci"><div class="ci-l">Итого</div><div class="ci-v">'+fN(d.service_fee)+'</div></div>'+
    '</div></div>').join('');
}

async function renderUsers(){
  const {data:users}=await db.from('profiles').select('*').order('created_at',{ascending:false});
  if(!users||!users.length){G('uBody').innerHTML='<div class="empty"><div class="empty-i">👥</div><div class="empty-t">Нет пользователей</div></div>';return}
  G('uBody').innerHTML='<div class="tbl-w"><table><thead><tr><th>Имя</th><th>Роль</th><th>WhatsApp</th></tr></thead><tbody>'+
    users.map(u=>'<tr><td><strong>'+(u.full_name||'—')+'</strong></td><td><span class="badge '+(u.role==='admin'?'b-platform':u.role==='broker'?'b-taken':'b-offered')+'">'+(u.role==='admin'?'Администратор':u.role==='broker'?'Брокер':'Менеджер банка')+'</span></td><td>'+
      (u.whatsapp?'<a class="wa" href="https://wa.me/'+u.whatsapp.replace(/\D/g,'')+'" target="_blank"><svg viewBox="0 0 24 24" fill="currentColor" width="14" height="14"><path d="M12 0C5.373 0 0 5.373 0 12c0 2.136.561 4.14 1.535 5.875L0 24l6.312-1.508A11.95 11.95 0 0012 24c6.627 0 12-5.373 12-12S18.627 0 12 0z"/></svg>WA</a>':'—')+
    '</td></tr>').join('')+
  '</tbody></table></div>';
}

function handleFiles(files){
  PF=[...files];
  G('fList').innerHTML=[...files].map(f=>'<div class="fi-item">📎 '+f.name+' <span style="color:var(--text3);font-size:11px">'+(f.size/1024).toFixed(1)+'KB</span></div>').join('');
}

function setupRT(){
  db.channel('brokeros-rt')
    .on('postgres_changes',{event:'INSERT',schema:'public',table:'leads'},()=>{toast('🔔 Новый лид!','info');G('ndot').style.display='block'})
    .on('postgres_changes',{event:'INSERT',schema:'public',table:'applications'},()=>{if(PR.role==='bank'){toast('🔔 Новая заявка!','info');G('ndot').style.display='block'}})
    .on('postgres_changes',{event:'INSERT',schema:'public',table:'offers'},()=>{if(PR.role==='broker'){toast('🔔 Офер от банка!','info');G('ndot').style.display='block'}})
    .on('postgres_changes',{event:'INSERT',schema:'public',table:'deals'},()=>{toast('🎉 Сделка закрыта!','ok')})
    .subscribe();
}

async function init(){
  try{
    db=window.supabase.createClient(SURL,SKEY);
    const {data:{session}}=await db.auth.getSession();
    setTimeout(()=>{G('splash').classList.add('hide');setTimeout(()=>{G('splash').style.display='none'},700)},1800);
    if(session?.user){await loadUser(session.user)}
    else{setTimeout(()=>G('loginPage').classList.add('show'),1800)}
  }catch(e){
    console.error(e);
    G('splash').style.display='none';
    G('loginPage').classList.add('show');
  }
}
if(document.readyState==='loading'){document.addEventListener('DOMContentLoaded',()=>setTimeout(init,100))}
else{setTimeout(init,100)}
if('serviceWorker' in navigator){navigator.serviceWorker.register('/sw.js').catch(()=>{})}
</script>
</body>
</html>
